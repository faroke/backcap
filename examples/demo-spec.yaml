# Example Capability Spec
# This is what makes capabilities AI-friendly

capability: cart
version: 1.0.0
description: Manage shopping carts for e-commerce
category: commerce

# Domain entities - the building blocks
entities:
  Cart:
    id: string
    userId: string
    status: string
    createdAt: date
    updatedAt: date

  CartItem:
    id: string
    cartId: string
    productId: string
    productName: string
    quantity: number
    price: number
    addedAt: date

# Use cases - what the capability can do
usecases:
  - createCart
  - getCart
  - addItem
  - removeItem
  - updateQuantity
  - clearCart
  - checkout
  - calculateTotal

# Events - what happens in the domain
events:
  - cart.created
  - cart.item_added
  - cart.item_removed
  - cart.quantity_updated
  - cart.cleared
  - cart.checked_out

# Ports - external dependencies (interfaces)
ports:
  - CartRepository
  - ProductCatalog
  - PriceCalculator
  - EventPublisher

# Dependencies on other capabilities
dependencies:
  - authentication

# Integrations available
integrations:
  - stripe
  - analytics
